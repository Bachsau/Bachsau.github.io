<!DOCTYPE html>
<html dir="ltr" lang="en">
	<head>
		<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
		<meta http-equiv="X-UA-Compatible" content="IE=edge">
		<title>Bachsau’s developer site</title>
		<link rel="canonical" href="http://dev.bachsau.com/">
		<style>
			* {
				box-sizing:border-box;
				margin:0;
				padding:0;
				border:0 none;
				border-spacing:inherit;
				border-collapse:inherit;
				background:transparent fixed;
				color:inherit;
				font:inherit;
				line-height:inherit;
				list-style:inherit;
				vertical-align:inherit;
				text-align:inherit;
				text-decoration:inherit;
				text-transform:inherit;
			}
			
			html {
				display:block;
				position:fixed;
				overflow:hidden;
				top:0;
				left:0;
				height:100%;
				width:100%;
				border-spacing:0;
				border-collapse:collapse;
				line-height:1.2em;
				list-style:none inside none;
				background:#11234D url("assets/bg.jpg") no-repeat center;
				background-size:cover;
				color:#000000;
				font:normal 24px "Times New Roman",Times,serif;
				vertical-align:baseline;
				text-align:center;
				text-decoration:none;
				text-transform:none;
				text-shadow:1px 1px 2px #808080;
			}
			
			body {
				display:block;
				position:static;
				overflow:auto;
				height:100%;
				width:100%;
				padding:20px;
			}
			
			h1 {
				font-size:32px;
				color:#FFFFFF;
			}
			
			li {
				display:block;
				margin:20px 0;
				vertical-align:middle;
			}
			
			a {
				display:inline-block;
				overflow:hidden;
				width:300px;
				padding:4px 30px;
				background:#C0C0C0 none;
				border:1px solid #000000;
				text-align:left;
				white-space:nowrap;
			}
			
			a:hover {
				background-color:#E0E0E0;
			}
		</style>
	</head>
	<body>
		<h1>Bachsau’s developer site</h1>
		<ul>
			<li><a href="https://github.com/Bachsau"><img src="assets/octocat.png" alt="Octocat" height="64" width="64"> GitHub profile</a></li>
			<li><a href="Mixtool/index.html"><img src="assets/mixtool.png" alt="Mixtool" height="64" width="64"> Mixtool website</a></li>
			<li><a href="XDG-Editor/index.html"><img src="assets/xdg-editor.svg" alt="XDG-Editor" height="64" width="64"> XDG-Editor</a></li>
		</ul>
	</body>
</html>
